# Short survival-focused descriptions per filming location.
# Keys are matched case-insensitively against Location.country.
# 2 to 3 sentences describing natural conditions, wildlife, and hazards
# a survivalist would face on the ground.

Alabama: |
  Naked and Afraid's Alabama shoots have taken place in the humid pine and hardwood forests of the state's rural interior. Summer heat, mosquitoes, ticks, venomous copperheads, cottonmouths, and black bears set the tone. Water is abundant but often stagnant and unsafe without boiling.

Alaska: |
  Alaska challenges have dropped survivalists into subarctic wilderness where the biggest threats are hypothermia, exposure, and dangerous megafauna. Bears (black, brown, and grizzly), wolves, and moose share the landscape with cold rivers, boggy tundra, and short daylight windows. Fishing is often the most reliable food source when the water is not frozen.

Argentina: |
  The Argentine shoots have taken place in the subtropical Chaco region and the Yungas cloud forest, both dense, humid, and biodiverse. Jaguars, pumas, tapirs, and venomous snakes such as fer-de-lance are ever present. Torrential rain, thick vegetation, and biting insects make travel and shelter-building brutal.

Arizona: |
  Naked and Afraid's Arizona locations are in the Sonoran Desert, a stark landscape of saguaro cactus, mesquite, and open sky. Daytime heat can exceed 110 degrees while nights drop sharply, and standing water is rare. Rattlesnakes, scorpions, coyotes, and Gila monsters share the terrain with survivalists who must ration water constantly.

Australia: |
  Australia's Outback and Northern Territory shoots deliver blistering heat, sudden freezing nights, and a menagerie of some of the world's most dangerous animals. Saltwater crocodiles patrol the rivers, venomous snakes coil under scrub, and dingoes prowl at night. Water is scarce and food often means goanna, catfish, or bush tucker that requires local knowledge.

Bahamas: |
  Naked and Afraid's Bahamas episodes have unfolded on remote cays and Andros Island's coastal wetlands, where the ocean is both a lifeline and a threat. Sharks, barracuda, and stinging jellyfish patrol the shallows while inland mangroves swarm with mosquitoes. Fresh water is nearly impossible to find without a still, and the reef supplies most of the food.

Belize: |
  The Belize challenges have taken place in tropical jungle and along the country's cave-riddled interior. Jaguars, howler monkeys, and fer-de-lance snakes dominate the wildlife, while flash-flooding rivers and near-constant humidity test shelter and fire skills. Coastal shoots add crocodiles and reef predators to the mix.

Bolivia: |
  The Bolivian shoot dropped survivalists into the lowland Amazon rainforest of the country's north. Daily downpours, near-100 percent humidity, and an oppressive canopy define the environment. Jaguars, caimans, piranha, botfly larvae, and tropical disease vectors like mosquitoes made this one of the show's toughest early locations.

Botswana: |
  Botswana's shoots have unfolded across the Okavango Delta and the surrounding savanna, a landscape of dry heat, seasonal floodplains, and abundant megafauna. Lions, leopards, elephants, hippos, and Nile crocodiles all frequent the water and thickets. Boma-building and fire discipline are essential every night.

Brazil: |
  Naked and Afraid's Brazil locations range from the Jalapao savanna and its sand dunes to Amazon-adjacent jungle. Extreme heat by day, cool nights, and periodic downpours combine with jaguars, capybaras, and countless snake and insect species. Water can be scarce in the savanna and unsafe in the wetlands without treatment.

Bulgaria: |
  The Bulgarian shoots have taken place in the temperate forested mountains, a very different environment from most of the show. Cold nights, wolves, brown bears, and boar are the main animal threats, while the terrain of ridges, streams, and old-growth forest tests navigation and shelter. Foraging can be rewarding in season.

Cambodia: |
  Cambodia's shoot took place in the dense lowland jungle where triple-canopy vegetation blocks the sun and heat and humidity are relentless. Venomous snakes, scorpions, and disease-carrying mosquitoes are constant threats. Water is plentiful but often contaminated, and thick vegetation makes travel and hunting difficult.

Canada: |
  The Canadian shoot placed survivalists in cold, wet boreal wilderness with black bears, wolves, and moose sharing the landscape. Even in warmer months, temperatures can drop hard at night, and hypothermia is the most immediate threat. Fishing and small-game hunting are the primary food strategies.

Colombia: |
  Colombia is one of the show's most-used locations, spanning rainforest, savanna, and coastal wetlands. Jaguars, spectacled caimans, bushmasters, and countless disease-carrying insects populate the interior. Torrential rain, oppressive humidity, and dense underbrush make Colombia consistently one of the toughest environments on the franchise.

Colorado: |
  Naked and Afraid's Colorado shoots have taken place in the high-altitude Rocky Mountain wilderness. Thin air, sudden temperature swings, mountain lions, and black bears set the tone, and hypothermia becomes a threat even in summer. Fishing streams and small game are the main food sources.

Costa Rica: |
  Costa Rica hosted the very first Naked and Afraid episode in remote lowland jungle. Torrential rain, thick vegetation, venomous snakes such as the fer-de-lance, and swarms of insects define the environment. Water is abundant but shelter-building becomes a race against the daily storm cycle.

Croatia: |
  The Croatian shoots have taken place in the coastal Adriatic scrubland and inland wetlands. Bears and wild boar roam the interior, and dry Mediterranean heat is offset by rocky terrain that punishes bare feet. Foraging can be surprisingly productive, though water is limited in the coastal karst.

Dominica: |
  Dominica dropped survivalists into the rugged volcanic rainforest of one of the Caribbean's wildest islands. Constant rain, steep ravines, hot springs, and boa constrictors define the terrain. Fresh water is plentiful in streams, but food is elusive under the dense triple canopy.

Ecuador: |
  Ecuador is a franchise mainstay, with shoots ranging from Amazon rainforest to coastal cliffs. The Amazon jungle brings jaguars, anacondas, caimans, and near-constant rain, while coastal shoots add rough surf and steep terrain. Humidity and biting insects are relentless in the interior.

Fiji: |
  Fiji's shoot placed survivalists on a small, uninhabited South Pacific island where the ocean supplied both food and threat. Coconut palms, coral, and reef fish are within reach, but there is no fresh water on the surface and shelter must withstand tropical storms. Sea snakes and reef sharks share the shallows.

Florida: |
  Florida's shoots have taken place in the Everglades, coastal swamps, and pine forests of the state's interior. American alligators, venomous cottonmouths and rattlesnakes, and Burmese pythons share the wetlands with clouds of mosquitoes. Humidity is oppressive year-round, and fresh water is often too swampy to drink.

Georgia: |
  Naked and Afraid's Georgia shoots have taken place in the humid pine and hardwood forests of the state's rural interior. Ticks, mosquitoes, venomous snakes, and black bears are the main wildlife concerns. Water is available but almost always requires boiling to be safe.

Guyana: |
  The Guyanese shoots have unfolded in the Rupununi savanna and Amazon-fringed jungle. Jaguars, caimans, bushmasters, and giant anteaters roam the landscape, and unshaded savanna heat pairs with humid, insect-heavy forest cover. Water is often muddy and requires careful sourcing.

Honduras: |
  Honduras has hosted shoots in the country's north coast rainforest, where the environment is hot, wet, and dense. Fer-de-lance snakes, howler monkeys, and biting insects share the jungle with the ever-present threat of torrential rain and flash flooding. Coastal shoots add saltwater hazards.

Illinois: |
  The Illinois shoot took place in the temperate forests and river bottoms of the southern part of the state. Deer, coyotes, ticks, and copperheads populate the woods, and while conditions are less extreme than the tropics, damp cold and thunderstorms are constant risks.

India: |
  India's shoots dropped survivalists into the Himalayan foothills, a cold, wet, and steep landscape unlike most Naked and Afraid locations. Leopards, sloth bears, and macaques share the forested slopes with punishing terrain and thin air. Hypothermia is the primary threat once the sun goes down.

Kentucky: |
  Kentucky's shoot took place in the temperate hardwood forests of the state's eastern hills. Black bears, timber rattlesnakes, copperheads, and cool nights define the environment. Water is abundant in creeks, and foraging is workable in warmer months.

Louisiana: |
  Louisiana's Atchafalaya Basin and coastal wetlands make for a shoot heavy on alligators, water moccasins, and biting insects. Humidity is relentless, the water is brown and buggy, and shelter must contend with sudden thunderstorms. Fishing and gator-adjacent foraging drive most food strategies.

Madagascar: |
  Madagascar's shoot placed survivalists in the dry deciduous forest of the western coast. Lemurs, fossa, and endemic snakes share a landscape defined by long dry seasons and hard-to-find water. Foraging is uniquely challenging because so much of the island's flora is found nowhere else.

Malaysia: |
  Malaysia's shoots have taken place in the Borneo rainforest, one of the world's oldest jungles. Constant rain, thick canopy, and swarming leeches define the ground level, while pythons, macaques, and hornbills share the trees. Fresh water is abundant but almost always requires filtering or boiling.

Maldives: |
  The Maldives shoot placed a survivalist on a tiny, uninhabited atoll where the reef and lagoon supplied nearly everything. There is no fresh water without a still, and food means coral fish, crabs, and coconut. Sun exposure is brutal and shelter must contend with sudden tropical squalls.

Mexico: |
  Mexico's shoots have ranged widely, from the humid Yucatan jungle to the arid Chihuahuan Desert and Baja Sur. Jaguars, jaguarundi, coral snakes, and cenote wetlands dominate the south, while the north brings rattlesnakes, scorpions, and extreme heat with no shade. Water sourcing shifts dramatically by region.

Mississippi: |
  The Mississippi shoot took place in the humid pine woods and cypress-swamp interior of the state. Alligators, cottonmouths, copperheads, and biting insects are the main wildlife concerns, and standing water is common but rarely safe to drink untreated.

Montana: |
  Montana's XL shoots placed survivalists in the Rocky Mountain wilderness for a 40-day cold-weather challenge. Grizzly bears, wolves, mountain lions, and moose share the alpine forests with dangerously cold nights and unpredictable weather. Fishing streams and hunting are the main food strategies.

Montserrat: |
  The Montserrat shoot took place on the volcanic Caribbean island, in the dense forest that surrounds the active volcano's exclusion zone. Rain, humidity, and steep terrain define the environment, and boa constrictors and stinging insects are the main animal threats.

Mozambique: |
  Mozambique's shoot took place in the coastal savanna and adjacent bushveld, with lions, hyenas, elephants, and hippos sharing the landscape. Daytime heat is intense and water is often turbid or predator-frequented, making sourcing dangerous.

Namibia: |
  Namibia's shoots have played out in the country's arid savanna and coastal desert, where daytime heat is brutal and nights swing cold. Lions, hyenas, black-backed jackals, and puff adders share the sparse terrain. Water sources are rare and often shared with megafauna, making a trip to the waterhole a real risk.

New Mexico: |
  The New Mexico shoot took survivalists into the Sabinoso Wilderness of the state's northeast, a stark canyon and mesa landscape. Rattlesnakes, mountain lions, and black bears roam the pinyon-juniper country, while daytime heat contrasts sharply with cold nights. Water sources are widely spaced.

Nicaragua: |
  Nicaragua's shoots have taken place in the country's northern rainforest and jungle-fringed islands. Jaguars, fer-de-lance snakes, bull sharks in the lakes, and swarming insects define the wildlife concerns. Torrential rain and thick canopy make shelter and fire the top priorities.

Panama: |
  Panama is a franchise mainstay with shoots in remote jungle islands and coastal rainforest. Fer-de-lance snakes, howler monkeys, crocodiles, and biting insects dominate the wildlife, while heat and humidity combine to sap energy fast. Water is abundant but almost always needs boiling.

Peru: |
  Peru's Amazon shoots placed survivalists in the western Amazon rainforest, one of the most biodiverse and demanding environments on Earth. Jaguars, anacondas, black caimans, and disease-carrying insects share dense triple-canopy jungle with near-daily downpours. Muddy rivers supply water that must be treated.

Philippines: |
  Philippine shoots have taken place across jungle islands where volcanic terrain, dense forest, and coastal reef converge. Saltwater crocodiles patrol some rivers, cobras and pit vipers roam the interior, and mosquitoes are relentless. Fresh water often requires descending steep ravines to reach streams.

South Africa: |
  South Africa is the franchise's most-used location, with shoots primarily in the northern savanna, the Selati Basin, and the Limpopo region. Lions, leopards, hyenas, elephants, cape buffalo, and every major venomous snake share the landscape. Boma-building is non-negotiable and every trip to water is a calculated risk.

Tanzania: |
  Tanzania's shoot took place in the savanna and thornscrub of the country's north. Lions, leopards, hyenas, elephants, and mambas all frequent the area. Heat is intense by day, and water sources double as predator gathering points.

Tennessee: |
  Tennessee's Smoky Mountain shoot placed survivalists in temperate hardwood forest with black bears, timber rattlesnakes, and copperheads. Nights get cold at elevation, and steep terrain makes travel and shelter-building demanding. Water is plentiful in creeks.

Texas: |
  Texas shoots have taken place in the Hill Country and arid west of the state. Rattlesnakes, scorpions, feral hogs, and extreme heat with little shade define the environment. Water is scarce and often needs to be sourced from cactus or dew.

Thailand: |
  Thailand's shoots have unfolded in the dense jungle interior and, more recently, on remote islands. Cobras, pit vipers, macaques, and clouds of mosquitoes populate the forest, while coastal shoots add rough surf and sun exposure. Torrential rain during the wet season adds to the challenge.

Tobago: |
  Tobago's shoots have taken place in the island's rainforest interior, where dense canopy, humid heat, and boa constrictors define the terrain. Fresh water is abundant in streams but the terrain of ridges and ravines makes travel exhausting.

Trinidad: |
  Trinidad's shoot dropped survivalists into the country's mud-volcano jungle, an unusual environment even by Naked and Afraid standards. Stinging red ants, boa constrictors, and thick vegetation combine with a landscape of bubbling mud vents. Water and fire management are the top challenges.

Zambia: |
  Zambia's shoots have taken place in the country's floodplain savanna and adjacent bushveld. Lions, leopards, hyenas, hippos, Nile crocodiles, and elephants all share the terrain. Water sources are also predator zones, making a nightly boma essential.
